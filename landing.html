<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>INFF Portal</title>
<link href="styles.css" rel="stylesheet"/>
</head>
<body class="landing-body">
<div aria-hidden="true" class="landing-pattern landing-pattern--top"></div>
<main class="landing">
<div aria-label="INFF Portal landing" class="landing-inner" role="region">
<div aria-label="Partner logos" class="landing-logos">
<img alt="Nigeria Government" src="assets/images/Nigeria_Gov_Logo.png"/>
<img alt="SDGs Nigeria Office" src="assets/images/SDGs_Nigeria_office_Logo.png"/>
<img alt="INFF" src="assets/images/INFF_Logo.png"/>
<img alt="European Union" src="assets/images/EU_Flag.png"/>
<img alt="UNDP" src="assets/images/UNDP-Logo-Blue.png"/>
</div>
<div class="landing-center"><div class="landing-titleblock"><h1 class="landing-title" id="landingMainText"><span class="t-black">Nigeria's </span><span class="t-purple">Integrated National</span><br/><span class="t-purple">Financing Framework</span></h1><div class="landing-subtitle" id="landingSubtitle">MONITORING DASHBOARD</div></div><a aria-label="Explore dashboard" class="landing-explore" href="index.html#overview" id="landingExplore">
<span>Explore</span>
</a></div>
</div>
</main>
<div aria-hidden="true" class="landing-pattern landing-pattern--bottom"></div>
<script>

    // Landing interaction:
    // 1) First click anywhere (including Explore) swaps the white-area content to the provided description.
    // 2) After the swap, clicking anywhere navigates to the dashboard (index.html#overview).
    (function () {
      const mainText = document.getElementById('landingMainText');
      const explore = document.getElementById('landingExplore');
      const subtitle = document.querySelector('.landing-subtitle');
      if (!mainText || !explore) return;

      const DESC = "This INFF Dashboard is Nigeria’s integrated national platform for tracking, analyzing, and coordinating financing for sustainable development. It brings together financing flows, reforms, and results under the INFF, aligning investments with national priorities and the SDGs. Designed as a living system, the dashboard enables interactive analysis and on-demand reporting in an effort to support evidence-based decision-making, coordination, and transparent communication.";

      let stage = 0; // 0 = initial, 1 = description shown

      function showDescription() {
        if (stage !== 0) return;
        stage = 1;
        mainText.textContent = DESC;
        mainText.classList.add('landing-title--desc');
      
        if (subtitle) subtitle.style.display = 'none';
      }

      function goDashboard() {
        window.location.href = 'index.html#overview';
      }

      // Prevent Explore from navigating on first click; it should just trigger the swap.
      explore.addEventListener('click', (e) => {
        if (stage === 0) {
          e.preventDefault();
          showDescription();
        }
      });

      // Clicking anywhere:
      // - first click: swap content
      // - subsequent clicks: go to dashboard
      document.addEventListener('click', (e) => {
        // Ignore clicks on the Explore circle: handled above.
        if (e.target === explore || explore.contains(e.target)) return;

        if (stage === 0) {
          showDescription();
        } else {
          goDashboard();
        }
      });

      // Explore circle follows the cursor across the whole landing page (exactly like the earlier version).
      // Works with our two-stage click behaviour above.
      let targetX = window.innerWidth * 0.78;
      let targetY = window.innerHeight * 0.55;
      let x = targetX, y = targetY;

      function clamp(v, a, b) { return Math.min(b, Math.max(a, v)); }

      function updateTarget(e) {
        targetX = e.clientX;
        targetY = e.clientY;
      }

      function bounds() {
        const r = explore.getBoundingClientRect();
        const pad = 10;
        const halfW = r.width / 2;
        const halfH = r.height / 2;
        return {
          minX: halfW + pad,
          maxX: window.innerWidth - halfW - pad,
          minY: halfH + pad,
          maxY: window.innerHeight - halfH - pad
        };
      }

      function tick() {
        const b = bounds();
        x = clamp(targetX, b.minX, b.maxX);
        y = clamp(targetY, b.minY, b.maxY);
        explore.style.left = x.toFixed(1) + 'px';
        explore.style.top  = y.toFixed(1) + 'px';
        requestAnimationFrame(tick);
      }

      window.addEventListener('mousemove', updateTarget, { passive: true });
      window.addEventListener('resize', () => {
        const b = bounds();
        x = clamp(x, b.minX, b.maxX);
        y = clamp(y, b.minY, b.maxY);
        targetX = clamp(targetX, b.minX, b.maxX);
        targetY = clamp(targetY, b.minY, b.maxY);
      });

      // Initialize and animate
      explore.style.left = x + 'px';
      explore.style.top  = y + 'px';
      requestAnimationFrame(tick);
    })();
</script>
</body>
</html>
